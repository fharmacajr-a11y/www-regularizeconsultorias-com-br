<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Redirecionando para o WhatsApp | Regularize Consultoria</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }

    main {
      max-width: 34rem;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: #475569;
    }
  </style>
</head>
<body>
  <main>
    <h1>Redirecionando para o WhatsApp</h1>
    <p>Se o redirecionamento não abrir automaticamente, entre em contato pelo número (19) 99627-5900.</p>
  </main>

  <script>
    const phone = '5519996275900';
    const params = new URLSearchParams(window.location.search);
    const text = params.get('text');
    const base = ['https://wa', '.me/', phone].join('');
    const url = text ? `${base}?text=${encodeURIComponent(text)}` : base;

    window.location.replace(url);
  </script>
</body>
</html>
